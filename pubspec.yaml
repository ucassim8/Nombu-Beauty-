name: nombu_beauty
description: NOMBU Beauty Booking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI and Media
  image_picker: ^1.0.7
  
  # Communication (WhatsApp & Phone Calls)
  url_launcher: ^6.3.1

  # Formatting (Crucial for Daily Earnings & Booking Dates)
  intl: ^0.19.0

  # Firebase Backend
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/Logonombu.jpg
