name: Build NOMBU Beauty APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node 24 for all actions

    steps:
      # 1️⃣ Checkout your repository
      - uses: actions/checkout@v3

      # 2️⃣ Install Flutter 3.41.4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      # 3️⃣ Get dependencies
      - run: flutter pub get

      # 4️⃣ Build the release APK
      - run: flutter build apk --release

      # 5️⃣ Upload the APK as an artifact
      - uses: actions/upload-artifact@v4
        with:
          name: nombu-beauty-apk
          path: build/app/outputs/flutter-apk/app-release.apk
