name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main  # or whichever branch you want to trigger deploys

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repo
      - uses: actions/checkout@v4

      # 2. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'  # match your Flutter version

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build Flutter Web
      - name: Build Web
        run: flutter build web --release

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Create temp folder for web build
          TEMP_DIR=$(mktemp -d)
          cp -r build/web/* $TEMP_DIR

          # Switch to gh-pages branch or create orphan if it doesn't exist
          if git show-ref --quiet refs/heads/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          # Clean old files
          git rm -rf . || true
          cp -r $TEMP_DIR/* .

          git add .
          git commit -m "Deploy Flutter Web" || echo "No changes to commit"

          # Push using GITHUB_TOKEN to avoid permission errors
          git push -u https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages --force
